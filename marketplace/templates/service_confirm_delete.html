{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card border-danger shadow-lg">
            <div class="card-body text-center p-5">
                <i class="fas fa-exclamation-triangle fa-4x text-danger mb-4"></i>
                <h2 class="text-danger mb-4 fw-bold">Confirm Deletion</h2>
                
                <p class="lead">You are about to permanently delete the service:<br>
                <span class="badge bg-light text-dark fs-5 mt-2 border">"{{ service.title }}"</span></p>
                
                <p class="text-muted small">This action cannot be undone. All data related to this listing will be removed.</p>
                
                <form method="POST" class="mt-4">
                    {% csrf_token %}
                    <div class="d-grid gap-2 d-md-block">
                        <button type="submit" class="btn btn-danger btn-lg px-4 me-md-2">
                            <i class="fas fa-trash-alt"></i> Yes, Delete
                        </button>
                        <a href="{% url 'service_detail' service.id %}" class="btn btn-outline-secondary btn-lg px-4">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
